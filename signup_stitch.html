<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ShopSpell - Create your store</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  }
</style>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
                "on-tertiary-fixed": "#1a1a2e",
                "tertiary-fixed": "#e2e0fc",
                "primary-fixed-dim": "#ffb4a8",
                "inverse-on-surface": "#f1efff",
                "on-surface-variant": "#59413d",
                "surface-container-highest": "#e2e1f3",
                "surface-container-high": "#e8e6f9",
                "primary": "#af2f22",
                "on-tertiary-container": "#28283d",
                "error-container": "#ffdad6",
                "surface": "#fbf8ff",
                "secondary-fixed-dim": "#5dd9d0",
                "surface-dim": "#dad8eb",
                "on-primary": "#ffffff",
                "on-background": "#1a1b28",
                "tertiary-container": "#908fa8",
                "inverse-surface": "#2f2f3d",
                "primary-container": "#f4614e",
                "on-tertiary": "#ffffff",
                "secondary": "#006a65",
                "surface-variant": "#e2e1f3",
                "secondary-fixed": "#7cf6ec",
                "tertiary-fixed-dim": "#c6c4df",
                "surface-container": "#eeecff",
                "inverse-primary": "#ffb4a8",
                "on-primary-container": "#5d0000",
                "surface-container-low": "#f4f2ff",
                "on-tertiary-fixed-variant": "#45455b",
                "outline": "#8d706c",
                "secondary-container": "#79f3ea",
                "surface-tint": "#af2f22",
                "on-secondary-fixed": "#00201e",
                "on-secondary-container": "#006f69",
                "error": "#ba1a1a",
                "on-primary-fixed-variant": "#8d160d",
                "on-secondary-fixed-variant": "#00504c",
                "on-error": "#ffffff",
                "on-primary-fixed": "#410000",
                "on-secondary": "#ffffff",
                "tertiary": "#5d5c74",
                "on-error-container": "#93000a",
                "outline-variant": "#e1bfb9",
                "background": "#fbf8ff",
                "surface-bright": "#fbf8ff",
                "on-surface": "#1a1b28",
                "primary-fixed": "#ffdad4",
                "surface-container-lowest": "#ffffff"
        },
        "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
        },
        "spacing": {
                "md": "16px",
                "gutter": "24px",
                "unit": "4px",
                "sm": "8px",
                "xl": "40px",
                "container-max": "1280px",
                "xs": "4px",
                "lg": "24px"
        },
        "fontFamily": {
                "h1": [
                        "Plus Jakarta Sans"
                ],
                "body-lg": [
                        "Plus Jakarta Sans"
                ],
                "label-caps": [
                        "Plus Jakarta Sans"
                ],
                "h3": [
                        "Plus Jakarta Sans"
                ],
                "code": [
                        "JetBrains Mono"
                ],
                "body-md": [
                        "Plus Jakarta Sans"
                ],
                "h2": [
                        "Plus Jakarta Sans"
                ]
        },
        "fontSize": {
                "h1": [
                        "40px",
                        {
                                "lineHeight": "1.2",
                                "letterSpacing": "-0.02em",
                                "fontWeight": "700"
                        }
                ],
                "body-lg": [
                        "18px",
                        {
                                "lineHeight": "1.6",
                                "fontWeight": "400"
                        }
                ],
                "label-caps": [
                        "11px",
                        {
                                "lineHeight": "1",
                                "letterSpacing": "0.08em",
                                "fontWeight": "600"
                        }
                ],
                "h3": [
                        "24px",
                        {
                                "lineHeight": "1.3",
                                "fontWeight": "700"
                        }
                ],
                "code": [
                        "13px",
                        {
                                "lineHeight": "1.4",
                                "fontWeight": "400"
                        }
                ],
                "body-md": [
                        "15px",
                        {
                                "lineHeight": "1.5",
                                "fontWeight": "400"
                        }
                ],
                "h2": [
                        "32px",
                        {
                                "lineHeight": "1.25",
                                "letterSpacing": "-0.01em",
                                "fontWeight": "700"
                        }
                ]
        }
},
    },
  }
</script>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-gutter antialiased text-on-surface selection:bg-primary-container selection:text-on-primary">
<main class="w-full max-w-[420px]">
<div class="bg-surface-container-lowest rounded-[16px] shadow-[0_8px_24px_rgba(0,0,0,0.08)] p-lg md:p-xl flex flex-col">
<header class="flex flex-col items-center text-center mb-xl">
<div class="w-16 h-16 bg-surface-container-low rounded-full flex items-center justify-center mb-md text-primary-container">
<span class="material-symbols-outlined text-[32px]" data-icon="auto_fix_high" data-weight="fill">auto_fix_high</span>
</div>
<h1 class="font-h2 text-h2 text-on-surface mb-xs">Create your store</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Step into the future of commerce. Let's craft your vision together.</p>
</header>
<form class="flex flex-col gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase ml-xs" for="email">Email Address</label>
<input class="bg-surface-container-low border-none rounded-lg px-md py-[14px] font-body-md text-body-md text-on-surface focus:ring-1 focus:ring-primary-container focus:outline-none transition-shadow placeholder:text-outline-variant" id="email" placeholder="hello@example.com" type="email"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase ml-xs" for="password">Password</label>
<input class="bg-surface-container-low border-none rounded-lg px-md py-[14px] font-body-md text-body-md text-on-surface focus:ring-1 focus:ring-primary-container focus:outline-none transition-shadow placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
</div>
<div class="mt-sm flex flex-col gap-md">
<button class="bg-primary-container text-on-primary rounded-full font-label-caps text-label-caps uppercase py-[16px] px-lg w-full flex items-center justify-center hover:opacity-90 active:scale-[0.98] transition-all tracking-widest shadow-[0_2px_12px_rgba(244,97,78,0.2)]" type="button">
            Get Started
          </button>
<div class="flex items-center gap-md">
<div class="h-px bg-surface-variant flex-1"></div>
<span class="font-label-caps text-label-caps text-outline-variant uppercase">Or continue with</span>
<div class="h-px bg-surface-variant flex-1"></div>
</div>
<button class="bg-surface-container-lowest border border-outline rounded-full font-label-caps text-label-caps text-on-surface uppercase py-[14px] px-lg w-full flex items-center justify-center gap-sm hover:bg-surface-container-low active:bg-surface-variant transition-colors tracking-widest" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
<path d="M1 1h22v22H1z" fill="none"></path>
</svg>
            Google
          </button>
</div>
</form>
</div>
<div class="mt-lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
        Already have an account? 
        <a class="text-secondary font-semibold hover:text-on-secondary-container hover:underline transition-colors" href="#">Log in</a>
</p>
</div>
</main>
</body></html>
